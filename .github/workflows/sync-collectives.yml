name: Sync collectives docs

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM: https://github.com/spiceMonkey/collective-comm.git
      UPSTREAM_BRANCH: main
      SUBPATH: documentation/modeling
      DEST: documentation/explaining/collectives
    steps:
      - uses: actions/checkout@v4

      - name: Snapshot upstream subfolder
        id: snap
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          git clone --depth=1 --branch="$UPSTREAM_BRANCH" "$UPSTREAM" "$TMP"
          SHA=$(git -C "$TMP" rev-parse --short HEAD)
          mkdir -p "$DEST"
          rsync -a --delete "$TMP/$SUBPATH/" "$DEST/"
          rm -rf "$TMP"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: sync collectives from spiceMonkey/collective-comm@${{ steps.snap.outputs.sha }}"
          branch: chore/sync-collectives
          delete-branch: true
          title: "Sync collectives docs from upstream (${{ steps.snap.outputs.sha }})"
          body: |
            Automated snapshot of `documentation/modeling/` from
            [spiceMonkey/collective-comm](https://github.com/spiceMonkey/collective-comm)
            at commit `${{ steps.snap.outputs.sha }}`, copied into
            `documentation/explaining/collectives/`.

            Review the diff, then merge to land the update.
          labels: documentation,automated
